volumes:
  voice_share:

services:
  # --- Body Streamer (REST Server for Streaming) ---
  body-streamer:
    build:
      context: .
      dockerfile: src/body/streamer/Dockerfile
    ports:
      - "8000:8000"
    stdin_open: true
    tty: true
    volumes:
      - voice_share:/app/shared/voice
    environment:
      - PORT=8000
      - TTS_ENGINE=aivisspeech
      - VOICEVOX_HOST=aivisspeech
      - VOICEVOX_PORT=50021
      - OBS_HOST=obs-studio
      - OBS_PORT=4455
      - OBS_PASSWORD=${OBS_PASSWORD:-}
      - STREAMING_MODE=${STREAMING_MODE:-false}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY:-}
      - YOUTUBE_LIVE_CHAT_ID=${YOUTUBE_LIVE_CHAT_ID:-}
      - YOUTUBE_POLLING_INTERVAL=5
      - YOUTUBE_CLIENT_SECRET_PATH=${YOUTUBE_CLIENT_SECRET_PATH:-/secret/google_client_secret.json}
      - YOUTUBE_TOKEN_PATH=${YOUTUBE_TOKEN_PATH:-/secret/yt_token.json}
      - YOUTUBE_CLIENT_SECRET_JSON=${YOUTUBE_CLIENT_SECRET_JSON:-}
      - YOUTUBE_TOKEN_JSON=${YOUTUBE_TOKEN_JSON:-}
    depends_on:
      aivisspeech:
        condition: service_healthy
      obs-studio:
        condition: service_started
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 5s
      timeout: 2s
      retries: 5

  # --- AivisSpeech Engine (TTS) ---
  # VOICEVOX-compatible API; started with --port 50021 for VOICEVOX compatibility
  aivisspeech:
    image: ghcr.io/aivis-project/aivisspeech-engine:nvidia-latest
    command: ["--port", "50021"]
    ports:
      - "50021:50021"
    volumes:
      - ${AIVIS_DATA_DIR:-~/.local/share/AivisSpeech-Engine}:/home/user/.local/share/AivisSpeech-Engine-Dev
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--output-document=/dev/null", "http://localhost:50021/version" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- OBS Studio (Streaming/Broadcasting) ---
  obs-studio:
    build:
      context: .
      dockerfile: src/body/streamer/obs/Dockerfile
    ports:
      - "8080:8080"  # noVNC web interface
      - "4455:4455"  # OBS WebSocket
    volumes:
      - voice_share:/app/shared/voice
    environment:
      - DISPLAY=:99
    shm_size: '2gb'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, video, graphics, utility, display]
